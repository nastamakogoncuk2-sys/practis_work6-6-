<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 6 - Завдання 3</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #fff7d6; }
        main { width: 620px; max-width: calc(100% - 32px); margin: 50px auto; padding: 28px; background: #fff; border: 4px solid #f4a261; text-align: center; }
        h1 { color: #e76f51; }
        .answers { margin: 22px 0; font-size: 20px; }
        button, select, input { margin: 8px; padding: 10px 14px; font-size: 18px; }
        #result { font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>
    <main>
        <h1>Тест для учнів початкових класів</h1>
        <h2 id="question"></h2>
        <div class="answers" id="answers"></div>
        <p id="result"></p>
    </main>

    <script type="text/javascript">
        var tasks = [
            ['Скільки буде 3×4?', ['7','12','14'], '12', 'Список'], ['Скільки буде 12-3?', ['8','9','10'], '9', 'Кнопка'],
            ['Скільки буде 5+2?', ['6','7','8'], '7', 'Перемикач'], ['Скільки буде 10÷5?', ['2','5','10'], '2', 'Список'],
            ['Хто сказав му?', ['кіт','корова','пес'], 'корова', 'Кнопка'], ['Хто сказав гав?', ['пес','кінь','півень'], 'пес', 'Перемикач'],
            ['Хто сказав му-му?', ['корова','качка','кіт'], 'корова', 'Список'], ['Хто сказав цвірінь-цвірінь?', ['горобець','корова','риба'], 'горобець', 'Кнопка'],
            ['Хто літає?', ['риба','птах','кіт'], 'птах', 'Перемикач'], ['Що літає?', ['літак','стіл','камінь'], 'літак', 'Список'],
            ['Хто бігає?', ['хлопчик','дерево','хмара'], 'хлопчик', 'Кнопка'], ['Хто скаче?', ['жаба','риба','стіл'], 'жаба', 'Перемикач'],
            ['Скільки хвилин у годині?', ['30','60','100'], '60', 'Список'], ['Скільки секунд у хвилині?', ['50','60','70'], '60', 'Кнопка'],
            ['Скільки днів у місяці?', ['30 або 31','7','12'], '30 або 31', 'Перемикач'], ['Скільки тижнів у році?', ['12','52','100'], '52', 'Список'],
            ['Якого кольору небо?', ['синє','червоне','зелене'], 'синє', 'Кнопка'], ['Якого кольору сонце?', ['жовте','синє','чорне'], 'жовте', 'Перемикач'],
            ['Якого кольору трава?', ['зелена','біла','синя'], 'зелена', 'Список'], ['Якого кольору море?', ['синє','червоне','жовте'], 'синє', 'Кнопка']
        ];
        var variant = parseInt(prompt('Введіть номер варіанту', '6'), 10);
        if (isNaN(variant) || variant < 1 || variant > tasks.length) variant = 6;
        var task = tasks[variant - 1];
        document.getElementById('question').textContent = task[0];
        var html = '';
        if (task[3] === 'Список') {
            html = '<select id="answer">' + task[1].map(function(a){ return '<option>' + a + '</option>'; }).join('') + '</select><br><button onclick="check()">Відповісти</button>';
        } else if (task[3] === 'Перемикач') {
            for (var i = 0; i < task[1].length; i++) html += '<label><input type="radio" name="answer" value="' + task[1][i] + '"> ' + task[1][i] + '</label><br>';
            html += '<button onclick="check()">Відповісти</button>';
        } else {
            for (var j = 0; j < task[1].length; j++) html += '<button onclick="check(\'' + task[1][j] + '\')">' + task[1][j] + '</button>';
        }
        document.getElementById('answers').innerHTML = html;
        function check(buttonValue) {
            var answer = buttonValue;
            if (!answer && task[3] === 'Список') answer = document.getElementById('answer').value;
            if (!answer && task[3] === 'Перемикач') {
                var selected = document.querySelector('input[name="answer"]:checked');
                answer = selected ? selected.value : '';
            }
            document.getElementById('result').textContent = answer === task[2] ? 'Правильно!' : 'Неправильно. Спробуй ще!';
        }
    </script>
</body>
</html>
