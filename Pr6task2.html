<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 6 - Завдання 2</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #eef4ff; }
        main { width: 720px; max-width: calc(100% - 32px); margin: 40px auto; padding: 26px; background: white; border: 3px solid #24558f; }
        h1 { margin-top: 0; text-align: center; color: #24558f; }
        table { margin: 18px auto; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 8px 14px; text-align: center; }
        .panel { padding: 16px; border: 2px dashed #24558f; text-align: center; }
        button, select, input { margin: 8px; padding: 8px; font-size: 16px; }
        #result { font-size: 20px; font-weight: bold; color: #24558f; }
    </style>
</head>
<body>
    <main>
        <h1>Тестування таблиці істинності</h1>
        <div id="info"></div>
        <div class="panel" id="formPanel"></div>
        <p id="result">Введіть відповіді та запустіть перевірку.</p>
    </main>

    <script type="text/javascript">
        var variants = [
            ['І','Кнопка','onclick'], ['І-НЕ','Перемикач','ondblclick'], ['АБО-НЕ','Вмикач','onmouseover'],
            ['ВИКЛЮЧАЮЧЕ АБО','Список','onclick'], ['ВИКЛЮЧАЮЧЕ АБО НЕ','Кнопка','ondblclick'], ['І','Перемикач','onmouseover'],
            ['І-НЕ','Вмикач','onclick'], ['АБО-НЕ','Список','ondblclick'], ['ВИКЛЮЧАЮЧЕ АБО','Кнопка','onmouseover'],
            ['ВИКЛЮЧАЮЧЕ АБО НЕ','Перемикач','onclick'], ['І','Вмикач','ondblclick'], ['І-НЕ','Список','onmouseover'],
            ['АБО-НЕ','Кнопка','onclick'], ['ВИКЛЮЧАЮЧЕ АБО','Список','ondblclick'], ['ВИКЛЮЧАЮЧЕ АБО НЕ','Вмикач','onclick'],
            ['І-НЕ','Список','ondblclick'], ['АБО-НЕ','Кнопка','onclick'], ['ВИКЛЮЧАЮЧЕ АБО','Перемикач','ondblclick'],
            ['ВИКЛЮЧАЮЧЕ АБО НЕ','Вмикач','onmouseover'], ['І','Список','onclick'], ['І-НЕ','Кнопка','ondblclick'],
            ['АБО-НЕ','Перемикач','onmouseover'], ['ВИКЛЮЧАЮЧЕ АБО','Вмикач','onclick'], ['ВИКЛЮЧАЮЧЕ АБО НЕ','Список','ondblclick'],
            ['І','Кнопка','onmouseover'], ['АБО-НЕ','Перемикач','onclick'], ['ВИКЛЮЧАЮЧЕ АБО','Вмикач','ondblclick'],
            ['ВИКЛЮЧАЮЧЕ АБО НЕ','Список','onmouseover'], ['І','Кнопка','onclick'], ['І-НЕ','Список','onclick']
        ];
        var variant = parseInt(prompt('Введіть номер варіанту', '6'), 10);
        if (isNaN(variant) || variant < 1 || variant > variants.length) variant = 6;
        var operation = variants[variant - 1][0];
        var formType = variants[variant - 1][1];
        var eventName = variants[variant - 1][2];
        document.getElementById('info').innerHTML = '<p>Варіант ' + variant + '. Логічна операція: <b>' + operation + '</b>. Форма: <b>' + formType + '</b>. Подія: <b>' + eventName + '</b>.</p>';

        function logic(a, b) {
            if (operation === 'І') return a && b;
            if (operation === 'І-НЕ') return !(a && b);
            if (operation === 'АБО-НЕ') return !(a || b);
            if (operation === 'ВИКЛЮЧАЮЧЕ АБО') return a !== b;
            return a === b;
        }
        function valueOfControl(id) {
            var el = document.getElementById(id);
            if (el.tagName === 'SELECT') return el.value === '1';
            if (el.type === 'checkbox') return el.checked;
            return el.value === '1';
        }
        function checkAnswer() {
            var a = valueOfControl('a');
            var b = valueOfControl('b');
            var answer = valueOfControl('answer');
            var right = logic(a, b);
            document.getElementById('result').textContent = answer === right ? 'Правильно!' : 'Помилка. Правильна відповідь: ' + Number(right);
        }
        function control(id, label) {
            if (formType === 'Список') return label + ': <select id="' + id + '"><option value="0">0</option><option value="1">1</option></select>';
            if (formType === 'Вмикач') return '<label><input type="checkbox" id="' + id + '"> ' + label + '</label>';
            return label + ': <input type="text" id="' + id + '" value="0" size="1">';
        }
        var eventAttr = eventName + '="checkAnswer()"';
        document.getElementById('formPanel').innerHTML = control('a','A') + control('b','B') + control('answer','Y') + '<br><button ' + eventAttr + '>Перевірити</button>';
    </script>
</body>
</html>
